<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live app preview — PickupRadar</title>
  <meta name="description" content="Full read-only PickupRadar app preview for UK delivery drivers — browse pickup data, search venues, and explore the report flow." />
  <link rel="stylesheet" href="preview.css?v=mobile1" />
  <style>
    :root {
      --bg: #06111a;
      --text: #f4f8fb;
      --muted: #9fb2c4;
      --border: #193247;
      --blue: #b9d7ee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #102638 0%, #06111a 50%, #03080d 100%);
      color: var(--text);
      line-height: 1.5;
      overflow-x: hidden;
    }

    .wrap {
      width: min(1100px, 94%);
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .site-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin-bottom: 28px;
      font-size: 15px;
      font-weight: 700;
    }

    .site-nav a {
      color: var(--muted);
      text-decoration: none;
    }

    .site-nav a:hover,
    .site-nav a.active { color: var(--blue); }

    .page-intro {
      text-align: center;
      margin-bottom: 28px;
      max-width: 640px;
      margin-left: auto;
      margin-right: auto;
    }

    .page-intro h1 {
      font-size: clamp(28px, 4vw, 40px);
      margin: 0 0 10px;
      letter-spacing: -0.8px;
      font-weight: 800;
    }

    .page-intro p {
      color: var(--muted);
      margin: 0;
      font-size: 16px;
      line-height: 1.55;
    }

    #livePreview {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      margin: 0 auto;
      width: 100%;
    }

    footer {
      border-top: 1px solid var(--border);
      margin-top: 40px;
      padding-top: 20px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: space-between;
      font-size: 14px;
    }

    footer a {
      color: #c9d7e4;
      text-decoration: none;
      margin-left: 14px;
    }

    @media (max-width: 600px) {
      .wrap {
        width: 94%;
        padding: 24px 0 32px;
      }

      .page-intro {
        margin-bottom: 16px;
      }

      .page-intro h1 {
        font-size: clamp(24px, 6.5vw, 32px);
      }
    }

    @media (max-width: 760px) {
      .wrap { padding: 20px 0 36px; }
      .page-intro { margin-bottom: 20px; }
      .page-intro h1 { font-size: 24px; }
      .page-intro p { font-size: 15px; }
      footer { display: block; }
      footer a { display: inline-block; margin: 10px 12px 0 0; }
    }
  </style>
</head>
<body class="page-live-preview">
  <main class="wrap">
    <nav class="site-nav" aria-label="Site">
      <a href="index.html">Home</a>
      <a href="app.html" class="active">Live preview</a>
      <a href="support.html">Support</a>
      <a href="privacy.html">Privacy</a>
    </nav>

    <div class="page-intro">
      <h1>Live app preview</h1>
      <p>Browse PickupRadar pickup data. Reporting is only available in the mobile app.</p>
    </div>

    <div id="livePreview" aria-label="Full PickupRadar app preview"></div>

    <footer>
      <div>© 2026 PickupRadar</div>
      <div>
        <a href="index.html">Home</a>
        <a href="support.html">Support</a>
        <a href="privacy.html">Privacy</a>
        <a href="mailto:support@pickupradar.co.uk">Email</a>
      </div>
    </footer>
  </main>

  <script src="venueDisplay.js?v=mobile1"></script>
  <script src="preview.js?v=mobile1"></script>
  <script>
    mountPickupRadarPreview(document.getElementById('livePreview'), {
      compact: false,
      large: true,
      supportMode: 'modal',
    });
  </script>
</body>
</html>
