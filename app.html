<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live preview — PickupRadar</title>
  <meta name="description" content="Live read-only preview of PickupRadar pickup wait times and venue reports for UK delivery drivers." />
  <link rel="stylesheet" href="preview.css" />
  <style>
    :root {
      --bg: #06111a;
      --text: #f4f8fb;
      --muted: #9fb2c4;
      --border: #193247;
      --blue: #b9d7ee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #102638 0%, #06111a 50%, #03080d 100%);
      color: var(--text);
      line-height: 1.5;
      overflow-x: hidden;
    }

    .wrap {
      width: min(980px, 92%);
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .site-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin-bottom: 28px;
      font-size: 15px;
      font-weight: 700;
    }

    .site-nav a {
      color: var(--muted);
      text-decoration: none;
    }

    .site-nav a:hover,
    .site-nav a.active { color: var(--blue); }

    .page-intro { margin-bottom: 24px; }

    .page-intro h1 {
      font-size: clamp(28px, 5vw, 42px);
      margin: 0 0 10px;
      letter-spacing: -1px;
    }

    .page-intro p {
      color: var(--muted);
      margin: 0;
      max-width: 680px;
      font-size: 16px;
    }

    .preview-note {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(82, 255, 117, 0.08);
      border: 1px solid rgba(82, 255, 117, 0.22);
      color: #b9eec8;
      font-size: 13px;
      font-weight: 700;
    }

    footer {
      border-top: 1px solid var(--border);
      margin-top: 40px;
      padding-top: 20px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: space-between;
      font-size: 14px;
    }

    footer a {
      color: #c9d7e4;
      text-decoration: none;
      margin-left: 14px;
    }

    @media (max-width: 760px) {
      .wrap { padding: 20px 0 36px; }
      .page-intro { margin-bottom: 18px; }
      .page-intro h1 { font-size: 24px; }
      .page-intro p { font-size: 15px; }
      footer { display: block; }
      footer a { display: inline-block; margin: 10px 12px 0 0; }
    }

    @media (max-width: 390px) {
      .site-nav { margin-bottom: 20px; font-size: 14px; }
      .page-intro h1 { font-size: 22px; }
      .preview-note { font-size: 12px; padding: 6px 12px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <nav class="site-nav" aria-label="Site">
      <a href="index.html">Home</a>
      <a href="index.html#live-preview">Live preview</a>
      <a href="support.html">Support</a>
      <a href="privacy.html">Privacy</a>
    </nav>

    <div class="page-intro">
      <h1>Live app preview</h1>
      <p>
        Browse real PickupRadar pickup data for UK delivery drivers. This page is read-only —
        reporting is only available in the mobile app.
      </p>
      <span class="preview-note">Read-only · Independent driver tool</span>
    </div>

    <div id="livePreview"></div>

    <footer>
      <div>© 2026 PickupRadar</div>
      <div>
        <a href="index.html">Home</a>
        <a href="support.html">Support</a>
        <a href="privacy.html">Privacy</a>
        <a href="mailto:support@pickupradar.co.uk">Email</a>
      </div>
    </footer>
  </main>

  <script src="venueDisplay.js"></script>
  <script src="preview.js"></script>
  <script>
    mountPickupRadarPreview(document.getElementById('livePreview'), { compact: false });
  </script>
</body>
</html>
